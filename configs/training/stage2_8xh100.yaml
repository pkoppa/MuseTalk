exp_name: 'stage2_8xh100'
output_dir: './exp_out/stage2/'
unet_sub_folder: musetalk
random_init_unet: False
whisper_path: "./models/whisper"
pretrained_model_name_or_path: "./models"
resume_from_checkpoint: True
padding_pixel_mouth: 10
vae_type: "sd-vae"
num_images_to_keep: 8
ref_dropout_rate: 0
syncnet_config_path: "./configs/training/syncnet.yaml"
use_adapted_weight: False
cropping_jaw2edge_margin_mean: 10
cropping_jaw2edge_margin_std: 10
crop_type: "dynamic_margin_crop_resize"
random_margin_method: "normal"
num_backward_frames: 16

data:
  dataset_key: "HDTF"
  train_bs: 1
  image_size: 256
  n_sample_frames: 16
  num_workers: 8
  pin_memory: True
  persistent_workers: True
  audio_padding_length_left: 2
  audio_padding_length_right: 2
  sample_method: pose_similarity_and_mouth_dissimilarity
  top_k_ratio: 0.51
  contorl_face_min_size: True
  min_face_size: 200

loss_params:
  l1_loss: 1.0
  vgg_loss: 0.01
  vgg_layer_weight: [1, 1, 1, 1, 1]
  pyramid_scale: [1, 0.5, 0.25, 0.125]
  gan_loss: 0.01
  fm_loss: [1.0, 1.0, 1.0, 1.0]
  sync_loss: 0.05
  mouth_gan_loss: 0.01

model_params:
  discriminator_params:
    scales: [1]
    block_expansion: 32
    max_features: 512
    num_blocks: 4
    sn: True
    image_channel: 3
    estimate_jacobian: False

discriminator_train_params:
  lr: 0.000005
  eps: 0.00000001
  weight_decay: 0.01
  patch_size: 1
  betas: [0.5, 0.999]
  epochs: 10000
  start_gan: 1000

solver:
  gradient_accumulation_steps: 8
  uncond_steps: 10
  mixed_precision: 'bf16'
  enable_xformers_memory_efficient_attention: True
  gradient_checkpointing: True
  max_train_steps: 250000
  max_grad_norm: 1.0
  learning_rate: 5.0e-6
  scale_lr: False
  lr_warmup_steps: 1000
  lr_scheduler: "linear"
  use_8bit_adam: False
  adam_beta1: 0.5
  adam_beta2: 0.999
  adam_weight_decay: 1.0e-2
  adam_epsilon: 1.0e-8

total_limit: 10
save_model_epoch_interval: 250000
checkpointing_steps: 2000
val_freq: 2000

seed: 41
